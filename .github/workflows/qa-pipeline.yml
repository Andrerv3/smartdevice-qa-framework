# ═══════════════════════════════════════════════════════════
# SmartDevice QA Framework — Pipeline CI/CD
# ═══════════════════════════════════════════════════════════
#
# Este workflow se ejecuta automáticamente cuando:
# - Se hace push a main o develop
# - Se abre un Pull Request contra main
# - Se ejecuta manualmente desde la UI de GitHub
#
# En entrevistas: "Configuré GitHub Actions para ejecutar
# la suite completa en cada push, con Chrome en modo headless,
# y publicar el reporte Allure en GitHub Pages."
# ═══════════════════════════════════════════════════════════

name: QA Automation Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  test:
    name: Run QA Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify environment
        run: |
          java -version
          mvn -version
          google-chrome --version

      - name: Run test suite
        run: mvn clean test -Dui.headless=true
        continue-on-error: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 30

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 30

  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_report: target/allure-report
          gh_pages: gh-pages
          allure_history: allure-history

      - name: Publish report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report