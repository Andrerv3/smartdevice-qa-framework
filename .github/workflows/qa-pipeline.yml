# ═══════════════════════════════════════════════════════════
# SmartDevice QA Framework — Pipeline CI/CD
# ═══════════════════════════════════════════════════════════
#
# Este workflow se ejecuta automáticamente cuando:
# - Se hace push a main o develop
# - Se abre un Pull Request contra main
# - Se ejecuta manualmente desde la UI de GitHub
#
# En entrevistas: "Configuré GitHub Actions para ejecutar
# la suite completa en cada push, con Chrome en modo headless,
# y publicar el reporte Allure en GitHub Pages."
# ═══════════════════════════════════════════════════════════

name: QA Automation Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permite ejecución manual desde GitHub UI

# Variables de entorno disponibles en todos los jobs
env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Ejecutar todos los tests
  # ─────────────────────────────────────────────
  test:
    name: Run QA Suite
    runs-on: ubuntu-latest  # Máquina virtual Linux gratuita en GitHub

    steps:

      # 1. Descarga el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instala Java 21
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven  # Cachea las dependencias Maven entre ejecuciones

      # 3. Instala Google Chrome en el servidor Linux
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # 4. Verifica versiones instaladas (útil para debugging)
      - name: Verify environment
        run: |
          java -version
          mvn -version
          google-chrome --version

      # 5. Ejecuta los tests
      # ui.headless=true porque el servidor Linux no tiene pantalla
      - name: Run test suite
        run: mvn clean test -Dui.headless=true
        # continue-on-error: true para que el pipeline
        # continúe y genere el reporte aunque fallen tests
        continue-on-error: true

      # 6. Guarda los resultados de Allure como artefacto
      # Esto permite descargarlos desde la UI de GitHub
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()  # Se ejecuta siempre, aunque fallen los tests
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 30  # Guarda los artefactos 30 días

      # 7. Guarda los reportes de Surefire (XML con resultados)
      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 2: Generar y publicar reporte Allure
  # Se ejecuta DESPUÉS del job "test"
  # ─────────────────────────────────────────────
  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: test  # Espera a que "test" termine
    if: always() # Se ejecuta aunque fallen los tests

    # Permisos necesarios para publicar en GitHub Pages
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # Descarga los resultados generados en el job anterior
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      # Genera el reporte HTML a partir de los resultados
      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_report: target/allure-report
          gh_pages: gh-pages
          allure_history: allure-history

      # Publica el reporte en GitHub Pages
      - name: Publish report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report
  ```

---

## Paso 3 — Habilitar GitHub Pages

Para que el reporte sea accesible públicamente:

  1. Ve a tu repositorio en GitHub
  2. Click en **Settings**
3. En el menú izquierdo: **Pages**
4. En **Source** selecciona: **Deploy from a branch**
5. En **Branch** selecciona: **gh-pages** / **root**
  6. Click **Save**

Tu reporte estará disponible en:
  ```
  https://TU_USUARIO.github.io/smartdevice-qa-framework/