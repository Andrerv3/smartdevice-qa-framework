# ═══════════════════════════════════════════
# SMARTDEVICE QA FRAMEWORK — CONFIGURACIÓN
# ═══════════════════════════════════════════
# IMPORTANTE: este archivo NO debe subirse a Git
# con credenciales reales. Las passwords van en
# variables de entorno en CI/CD.
# ═══════════════════════════════════════════

# ─── ENTORNO ───────────────────────────────
environment=qa

# ─── UI - SAUCEDEMO ────────────────────────
ui.base.url=https://www.saucedemo.com
ui.username=standard_user
ui.password=secret_sauce
ui.browser=chrome
ui.headless=false
ui.implicit.wait=10
ui.explicit.wait=15
ui.page.load.timeout=30

# ─── API - JSONPLACEHOLDER ─────────────────
api.base.url=https://jsonplaceholder.typicode.com
api.timeout=10000

# ─── REPORTING ─────────────────────────────
allure.results.dir=target/allure-results
screenshot.on.failure=true